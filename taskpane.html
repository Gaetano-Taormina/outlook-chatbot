<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestore Email Avanzato</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    
    <style>
        :root {
            --bg-card: rgba(255, 255, 255, 0.85); /* Effetto vetro chiaro */
            --text-main: #202124;
            --text-sec: #5f6368;
            --border-color: rgba(0, 0, 0, 0.1);
            --outlook-primary: #0078d4;
            --outlook-light: #28a8ea;
            --outlook-gradient: linear-gradient(135deg, var(--outlook-light), var(--outlook-primary));
            --danger: #d93025;
            --input-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --radius-md: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-card: rgba(30, 30, 31, 0.85); /* Effetto vetro scuro */
                --text-main: #e8eaed;
                --text-sec: #9aa0a6;
                --border-color: rgba(255, 255, 255, 0.1);
                --input-bg: rgba(0, 0, 0, 0.5);
                --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }
        }

        @keyframes slideFadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-ui { animation: slideFadeIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; 
            color: var(--text-main); 
            height: 100vh; display: flex; flex-direction: column;
            
            /* NUOVA IMMAGINE FLUIDA AZZURRO/DARK LIBERA DA DIRITTI */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        #login-screen, #app-screen {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            height: 100%;
        }

        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .hero-icon { font-size: 40px; margin-bottom: 10px; }
        
        .login-btn {
            background: var(--outlook-gradient); color: white; border: none;
            padding: 12px 24px; border-radius: 24px; font-weight: 600; font-size: 14px;
            cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 120, 212, 0.4); }

        #app-screen { display: none; flex-direction: column; }
        
        #results-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .email-item {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 12px; border-radius: var(--radius-md);
            display: flex; align-items: center; gap: 12px; transition: transform 0.2s;
            backdrop-filter: blur(5px);
        }
        .email-item:hover { transform: translateX(2px); border-color: var(--outlook-light); }
        .email-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--outlook-primary); }
        .email-info { flex: 1; font-size: 13px; overflow: hidden; }
        .email-sender { font-weight: 600; color: var(--text-main); }
        .email-subject { color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #control-bar {
            background: var(--bg-card); padding: 15px; border-top: 1px solid var(--border-color);
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px;
        }
        
        .modern-select {
            appearance: none; background-color: transparent; color: var(--outlook-primary);
            border: none; font-weight: 700; font-size: 14px; cursor: pointer;
            padding: 5px 20px 5px 0; outline: none; transition: color 0.2s;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230078d4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right center; background-size: 16px;
        }
        @media (prefers-color-scheme: dark) { .modern-select { color: var(--outlook-light); background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2328a8ea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); } }

        .input-group { display: flex; gap: 8px; align-items: center; }
        .modern-input {
            flex: 1; background: var(--input-bg); color: var(--text-main);
            border: 1px solid transparent; padding: 12px 16px;
            border-radius: 24px; font-size: 14px; outline: none; transition: all 0.3s ease;
        }
        .modern-input:focus { border: 1px solid var(--outlook-primary); box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.15); }
        
        .action-btn {
            background: var(--outlook-gradient); color: white; border: none; border-radius: 50%;
            width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 120, 212, 0.3);
        }
        .action-btn:hover { transform: scale(1.1) rotate(5deg); }
        .action-btn.danger { background: var(--danger); box-shadow: 0 2px 8px rgba(217, 48, 37, 0.3); }

        #status-text { font-size: 11px; color: var(--text-sec); text-align: center; margin-bottom: 5px; font-weight: 500;}
        .hidden { display: none !important; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="hero-icon">📩</div>
        <h2 style="color: var(--text-main); margin-top: 0;">Outlook Power Tool</h2>
        <p style="color: var(--text-sec); font-size: 13px; margin-bottom: 25px;">Il tuo assistente intelligente per la pulizia di massa.</p>
        <button class="login-btn" id="loginBtn">Connetti Account Microsoft</button>
    </div>

    <div id="app-screen">
        <div id="results-area">
            <div style="text-align: center; color: var(--text-sec); font-size: 12px; margin-top: 20px;" id="empty-state">
                👋 Usa il menu in basso per iniziare.
            </div>
        </div>

        <div id="control-bar">
            <div id="status-text">Sistema pronto.</div>
            
            <div class="top-bar">
                <select id="actionSelector" class="modern-select">
                    <option value="search">Cerca email</option>
                    <option value="security">🛡️ Analizza Sicurezza</option>
                    <option value="markRead">📖 Segna come Lette</option>
                    <option value="flag">🚩 Contrassegna (Flag)</option>
                    <option value="pdf">📄 Salva come PDF</option>
                    <option value="open">🌐 Apri nel Browser</option>
                    <option value="folder">Sposta in cartella</option>
                    <option value="tag">Applica tag</option>
                    <option value="spam">Blocca Mittente (Spam)</option>
                    <option value="delete">Elimina selezionate</option>
                </select>
                <button id="selectAllBtn" class="hidden" style="background:transparent; border:none; color:var(--text-sec); font-size:12px; cursor:pointer; font-weight:bold;">Seleziona tutte</button>
            </div>

            <div class="input-group animate-ui" id="inputWrapper">
                <input type="text" id="dynamicInput" class="modern-input" placeholder="Scrivi la parola da cercare...">
                
                <button id="executeBtn" class="action-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="taskpane.js?v=405" type="text/javascript"></script>
</body>
</html>
