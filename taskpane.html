<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestore Email Avanzato</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    
    <style>
        :root {
            --bg-card: rgba(30, 30, 31, 0.85); /* Tema Dark di base */
            --text-main: #e8eaed;
            --text-sec: #9aa0a6;
            --border-color: rgba(255, 255, 255, 0.15);
            --outlook-primary: #0078d4;
            --outlook-light: #28a8ea;
            --outlook-gradient: linear-gradient(135deg, var(--outlook-light), var(--outlook-primary));
            
            --wifi-red: #d93025;
            --wifi-yellow: #f5b041;
            --wifi-green: #31c23f;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; 
            color: var(--text-main); 
            height: 100vh; display: flex; flex-direction: column;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden; /* Blocca scorrimento orizzontale */
        }

        #app-screen { 
            background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            height: 100%; display: flex; flex-direction: column; 
        }

        /* INTESTAZIONE SUPERIORE CON TASTO RESET */
        .top-header {
            padding: 15px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-weight: bold; font-size: 16px; margin: 0; }
        
        /* TASTO RESET (Aggiorna) */
        .refresh-btn {
            background: transparent; border: none; color: var(--text-sec);
            cursor: pointer; padding: 5px; border-radius: 50%;
            transition: color 0.2s; outline: none;
        }
        .refresh-btn:hover { color: var(--outlook-light); background: rgba(255,255,255,0.05); }
        .spin-anim { animation: spin 0.3s linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* AREA CHAT E MESSAGGI */
        #chat-area {
            flex: 1; padding: 15px; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        /* Scrollbar personalizzata in tinta (Verticale) */
        #chat-area::-webkit-scrollbar { width: 6px; }
        #chat-area::-webkit-scrollbar-track { background: transparent; }
        #chat-area::-webkit-scrollbar-thumb { background: rgba(0, 120, 212, 0.3); border-radius: 10px; }
        #chat-area::-webkit-scrollbar-thumb:hover { background: rgba(0, 120, 212, 0.6); }

        .bot-msg {
            background: rgba(0, 120, 212, 0.15); border: 1px solid rgba(0, 120, 212, 0.3);
            padding: 12px 16px; border-radius: 16px; border-bottom-left-radius: 2px;
            max-width: 85%; font-size: 14px; line-height: 1.4; align-self: flex-start;
            animation: fadeIn 0.3s ease-out;
        }
        .user-msg {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color);
            padding: 12px 16px; border-radius: 16px; border-bottom-right-radius: 2px;
            max-width: 85%; font-size: 14px; align-self: flex-end;
            animation: fadeIn 0.3s ease-out;
        }

        /* ANIMAZIONE TYPING (Bot sta scrivendo...) */
        .typing-indicator {
            align-self: flex-start; padding: 8px 12px;
            display: none; align-items: center; gap: 4px; color: var(--text-sec); font-size: 12px;
        }
        .dot { width: 6px; height: 6px; background: var(--text-sec); border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* AREA DI CONTROLLO INFERIORE (Pulita) */
        #control-bar {
            background: var(--bg-card); padding: 15px; border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: flex-start;
        }

        .controls-left-cluster { display: flex; align-items: flex-end; gap: 8px; margin-right: 12px; }

        /* ICONA WI-FI */
        .wifi-icon { width: 16px; height: 16px; flex-shrink: 0; transition: fill 0.3s; }
        .wifi-red { fill: var(--wifi-red); }
        .wifi-yellow { fill: var(--wifi-yellow); animation: pulse 1s infinite; }
        .wifi-green { fill: var(--wifi-green); }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* TASTO MENU (Pulsante e sollevato) */
        .menu-trigger-btn {
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--border-color); background: transparent; color: var(--text-main);
            display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0;
            position: relative; bottom: 8px; /* Sollevato rispetto al wifi */
            transition: all 0.3s ease;
        }
        .menu-pulsing {
            border-color: var(--outlook-light);
            box-shadow: 0 0 10px rgba(40, 168, 234, 0.4);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 168, 234, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(40, 168, 234, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 168, 234, 0); } }

        .input-group { flex: 1; display: flex; gap: 8px; align-items: center; }
        .modern-input { flex: 1; background: rgba(0,0,0,0.2); color: var(--text-main); border: 1px solid transparent; padding: 12px 16px; border-radius: 24px; outline: none; }
        .modern-input:focus { border: 1px solid var(--outlook-primary); }
        .action-btn { background: var(--outlook-gradient); color: white; border: none; border-radius: 50%; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; cursor: pointer;}
        
    </style>
</head>
<body>

    <div id="app-screen">
        
        <div class="top-header">
            <h2 class="header-title">Assistente Chatbot</h2>
